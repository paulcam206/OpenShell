# Navigator mise configuration
# See https://mise.jdx.dev/ for documentation

experimental_monorepo_root = true

[settings]
experimental = true

[monorepo]
config_roots = ["docker", "kube"]

[tools]
python = "3.12"
rust = "stable"
kubectl = "latest"
uv = "latest"
protoc = "29"
skaffold = "latest"
k3d = "latest"
helm = "latest"
sccache = "latest"

[env]
_.path = ["{{config_root}}/scripts/bin"]
_.python.venv = { path = ".venv", create = true }

KUBECONFIG = "{{config_root}}/kubeconfig"
UV_CACHE_DIR = "{{config_root}}/.cache/uv"

# Enable sccache for faster Rust builds
RUSTC_WRAPPER = "sccache"
SCCACHE_DIR = "{{config_root}}/.cache/sccache"

# ============================================================================
# Build Tasks
# ============================================================================

[tasks.build]
description = "Build all Rust crates"
run = "cargo build --workspace"

[tasks."build:release"]
description = "Build all Rust crates in release mode"
run = "cargo build --workspace --release"

[tasks.check]
description = "Check all Rust crates for errors"
run = "cargo check --workspace"

[tasks.clippy]
description = "Run Clippy lints"
run = "cargo clippy --workspace --all-targets"

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

# ============================================================================
# Test Tasks
# ============================================================================

[tasks.test]
description = "Run all tests (Rust + Python)"
depends = ["test:rust", "test:python", "test:e2e:sandbox"]

[tasks."test:rust"]
description = "Run Rust tests"
run = "cargo test --workspace"

[tasks."test:python"]
description = "Run Python tests"
env = { UV_NO_SYNC = "1" }
run = "uv run pytest python/"

[tasks."test:e2e:sandbox"]
description = "Run sandbox e2e tests via skaffold verify"
run = """
#!/usr/bin/env bash
set -euo pipefail

BUILD_FILE=".skaffold-build.json"

mise -C kube run start
export DOCKER_BUILDKIT=1
skaffold build -q --file-output="${BUILD_FILE}" -p e2e-sandbox
skaffold deploy --build-artifacts="${BUILD_FILE}" --load-images -p e2e-sandbox
skaffold verify --build-artifacts="${BUILD_FILE}" -p e2e-sandbox
"""

# ============================================================================
# Python Tasks
# ============================================================================

[tasks."python:dev"]
description = "Install Python package in development mode (builds CLI binary)"
run = "uv sync --group dev && uv pip install ."

[tasks."python:build"]
description = "Build Python wheel with CLI binary"
run = "uv run maturin build --release"

[tasks."python:lint"]
description = "Lint Python code with ruff"
env = { UV_NO_SYNC = "1" }
run = "uv run ruff check python/"

[tasks."python:fmt"]
description = "Format Python code with ruff"
run = "uv run ruff format python/"

[tasks."python:typecheck"]
description = "Type check Python code with ty"
run = "uv run ty check python/"

# ============================================================================
# Server Tasks
# ============================================================================

[tasks.server]
description = "Run the Navigator server"
run = "cargo run -p navigator-server --"

[tasks."server:release"]
description = "Run the Navigator server in release mode"
run = "cargo run -p navigator-server --release --"

# ============================================================================
# CLI Tasks
# ============================================================================

[tasks.cli]
description = "Run the Navigator CLI"
run = "cargo run -p navigator-cli --"

# ============================================================================
# Sandbox Tasks
# ============================================================================

[tasks.sandbox]
description = "Run the sandbox container with an interactive shell"
depends = ["//docker:build:factory"]
run = """
TTY_FLAG=""
if [ -t 0 ]; then
  TTY_FLAG="-it"
fi
CMD=("$@")
if [ "$#" -eq 0 ]; then
  CMD=("/bin/bash")
fi
docker run ${TTY_FLAG} \
  --cap-add=SYS_ADMIN \
  --cap-add=NET_ADMIN \
  -v ${PWD}/dev-sandbox-policy.yaml:/var/navigator/policy.yaml:ro \
  -v ${PWD}/tmp:/sandbox/tmp \
  -e HOME=/sandbox \
  -w /sandbox \
  -e NAVIGATOR_SANDBOX_POLICY=/var/navigator/policy.yaml \
  navigator-factory -i "${CMD[@]}"
"""

# ============================================================================
# Helm Tasks
# ============================================================================

[tasks."helm:lint"]
description = "Lint the navigator helm chart"
run = "helm lint helm/navigator"

# ============================================================================
# Kubernetes Tasks
# ============================================================================

[tasks."kube:start"]
description = "Start/create k3d cluster with registry"
run = "mise -C kube run start"

[tasks."kube:stop"]
description = "Stop k3d cluster (preserves state)"
run = "mise -C kube run stop"

[tasks."kube:destroy"]
description = "Delete k3d cluster completely"
run = "mise -C kube run destroy"

[tasks."kube:deploy"]
description = "Build and deploy via skaffold"
run = "mise -C kube run deploy"

[tasks."kube:deploy-svc"]
description = "Build images and restart services (no helm/config changes)"
run = "mise -C kube run deploy-svc"

[tasks."kube:dev"]
description = "Dev mode with hot reload via skaffold"
run = "mise -C kube run dev"

# ============================================================================
# Development Tasks
# ============================================================================

[tasks.clean]
description = "Clean build artifacts"
run = "cargo clean"

[tasks.all]
description = "Build, lint, and test everything"
depends = ["fmt:check", "clippy", "test", "python:lint"]

# ============================================================================
# Git Hooks
# ============================================================================

[tasks."pre-commit"]
description = "Pre-commit checks (format, lint, and tests)"
depends = ["fmt:check", "clippy", "python:lint", "test:rust", "test:python"]
