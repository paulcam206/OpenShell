apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: navigator
build:
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
  artifacts:
    - image: navigator-server
      docker:
        dockerfile: docker/Dockerfile.server
  local:
    push: true
    useBuildkit: true
    tryImportMissing: false
deploy:
  helm:
    releases:
      - name: navigator
        chartPath: helm/navigator
        namespace: navigator
        createNamespace: true
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_navigator_server}}"
          image.tag: "{{.IMAGE_TAG_navigator_server}}@{{.IMAGE_DIGEST_navigator_server}}"
manifests:
  rawYaml:
    - https://github.com/kubernetes-sigs/agent-sandbox/releases/download/v0.1.0/manifest.yaml
verify:
  - name: sandbox-e2e
    container:
      name: sandbox-test-container
      image: sandbox-test-container
      securityContext:
        capabilities:
          add:
            - SYS_ADMIN
            - NET_ADMIN
    executionMode:
      kubernetesCluster: {}
profiles:
  - name: e2e-sandbox
    build:
      artifacts:
        - image: navigator-server
          docker:
            dockerfile: docker/Dockerfile.server
        - image: sandbox-test-container
          docker:
            dockerfile: docker/Dockerfile.sandbox-test
      local:
        push: true
